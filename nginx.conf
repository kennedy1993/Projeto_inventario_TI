# Nginx - Reverse Proxy para ITAM Avanço Construções
# Salvar em: /etc/nginx/sites-available/inventario-ti
# Depois: sudo ln -s /etc/nginx/sites-available/inventario-ti /etc/nginx/sites-enabled/
# E: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # Substitua pelo seu domínio ou IP público do servidor
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # Tamanho máximo de upload (para importação de Excel)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/inventario-access.log;
    error_log  /var/log/nginx/inventario-error.log;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts para operações longas (IA, importação Excel)
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }
}

# Após configurar SSL com Let's Encrypt (certbot --nginx), o bloco HTTPS
# será adicionado automaticamente pelo certbot.
